<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador e Impresora de QRs - Trazabilidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para generar QRs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Estilos específicos para la impresión */
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; font-size: 12pt; }
            /* Configurar grid de etiquetas para folio A4 */
            #printArea { 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr) !important; 
                gap: 15px !important; 
                padding: 10px !important;
                width: 100% !important;
            }
            .qr-card { 
                page-break-inside: avoid; 
                border: 1px dashed #ccc !important;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- Panel de Control (No se imprime) -->
    <div class="no-print bg-white p-6 shadow-md mb-6 max-w-2xl mx-auto rounded-b-xl border-t-4 border-green-600">
        <h1 class="text-2xl font-bold text-green-700 mb-2">🖨️ Generador de Etiquetas QR</h1>
        <p class="text-gray-600 text-sm mb-6">Genera códigos que enlazan directamente al visor de tu proyecto.</p>
        
        <form id="qrForm" class="space-y-4">
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4" id="localWarning">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-yellow-700">
                            Estás usando una ruta local. Los QRs no funcionarán en otros móviles.
                            <button type="button" onclick="setGithubUrl()" class="font-bold underline hover:text-yellow-800 ml-1">
                                Click aquí para usar la URL de GitHub
                            </button>
                        </p>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">URL del Visor Web</label>
                <div class="flex gap-2">
                    <input type="url" id="baseUrl" required 
                        class="w-full border border-gray-300 rounded p-2 focus:ring-green-500 bg-gray-50 text-sm" 
                        placeholder="https://fjferran.github.io/trazabilidad-neuro-ia/index.html">
                </div>
                <p class="text-[10px] text-gray-500 mt-1">Se añadirá <b>?qr=CODIGO</b> automáticamente al final.</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Lista de Códigos (uno por línea o por coma)</label>
                <textarea id="loteList" rows="4" required 
                    class="w-full border border-gray-300 rounded p-2 focus:ring-green-500 font-mono text-sm" 
                    placeholder="PACHAMAMA, MARIQUITA, CONICET..."></textarea>
            </div>

            <div class="flex items-end gap-2">
                <button type="submit" class="bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700 transition w-full font-bold shadow-lg">
                    Generar Etiquetas
                </button>
                <button type="button" onclick="window.print()" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition w-full font-bold flex justify-center items-center gap-2 shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Imprimir
                </button>
            </div>
        </form>
    </div>

    <!-- Área de Impresión (Rejilla de Etiquetas) -->
    <div id="printArea" class="max-w-4xl mx-auto flex flex-wrap gap-4 p-4 justify-center bg-white shadow-sm print:shadow-none min-h-[500px]">
        <div class="no-print mt-20 text-gray-400 w-full text-center italic">
            Configura la URL y los códigos arriba para empezar...
        </div>
    </div>

    <script>
        // Función para cambiar a la URL de producción (GitHub)
        function setGithubUrl() {
            document.getElementById('baseUrl').value = 'https://fjferran.github.io/trazabilidad-neuro-ia/index.html';
            document.getElementById('localWarning').style.display = 'none';
        }

        // Intentar autodetectar la URL actual para facilitar el trabajo
        const currentUrl = window.location.href;
        if (currentUrl.includes('generador_qr.html')) {
            const potentialLocal = currentUrl.replace('generador_qr.html', 'index.html');
            document.getElementById('baseUrl').value = potentialLocal;
            
            // Si NO estamos en GitHub, mostramos el aviso
            if (!currentUrl.includes('github.io')) {
                document.getElementById('localWarning').style.display = 'block';
            } else {
                document.getElementById('localWarning').style.display = 'none';
            }
        }

        document.getElementById('qrForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const printArea = document.getElementById('printArea');
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const textContent = document.getElementById('loteList').value;
            
            // Limpiar la zona de impresión
            printArea.innerHTML = '';
            printArea.style.display = 'grid';
            printArea.style.gridTemplateColumns = 'repeat(auto-fill, minmax(180px, 1fr))';
            
            // Procesar lista (comas o saltos de línea)
            const codigos = textContent.split(/[\n,]+/).map(s => s.trim()).filter(s => s !== "");

            codigos.forEach(code => {
                let cleanBase = baseUrl.split('?')[0];
                if (!cleanBase.endsWith('.html') && !cleanBase.endsWith('/')) {
                    cleanBase += '/index.html';
                } else if (cleanBase.endsWith('/')) {
                    cleanBase += 'index.html';
                }
                
                const fullLink = `${cleanBase}?qr=${encodeURIComponent(code)}`;

                const card = document.createElement('div');
                card.className = "qr-card flex flex-col items-center justify-center p-4 border border-gray-200 rounded-lg text-center bg-white";
                
                const qrContainer = document.createElement('div');
                qrContainer.className = "p-1 bg-white";
                
                new QRCode(qrContainer, {
                    text: fullLink,
                    width: 140,
                    height: 140,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M 
                });

                const label = document.createElement('div');
                label.className = "mt-3";
                label.innerHTML = `
                    <div class="text-[9px] text-gray-400 font-bold tracking-tighter uppercase mb-0.5">Trazabilidad Neuro-IA</div>
                    <div class="text-sm font-black text-gray-900 border-t-2 border-green-600 pt-1">${code}</div>
                    <a href="${fullLink}" target="_blank" class="no-print text-[10px] text-blue-500 underline mt-1 block">Probar enlace</a>
                `;

                const urlLabel = document.createElement('div');
                urlLabel.className = "text-[7px] text-gray-300 break-all mt-1 max-w-[140px]";
                urlLabel.innerText = fullLink;

                card.appendChild(qrContainer);
                card.appendChild(label);
                card.appendChild(urlLabel);
                printArea.appendChild(card);
            });
        });
    </script>
</body>
</html>
